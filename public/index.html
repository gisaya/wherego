<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>어디고 약관</title>
    <style>
      :root {
        color-scheme: light;
        --background: #f7f8fa;
        --foreground: #191f28;
        --muted: #6b7684;
        --border: #d1d6db;
        --primary: #3182f6;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--background);
        color: var(--foreground);
        font-family: Arial, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      }

      main {
        max-width: 760px;
        margin: 0 auto;
        padding: 48px 24px 72px;
        line-height: 1.7;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 30px;
        line-height: 1.3;
      }

      p {
        margin: 0 0 32px;
        color: var(--muted);
      }

      ul {
        padding: 0;
        list-style: none;
      }

      li {
        border-top: 1px solid var(--border);
      }

      a {
        display: block;
        padding: 18px 0;
        color: var(--primary);
        font-size: 18px;
        font-weight: 700;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>어디고 약관</h1>
      <p>앱인토스 등록용 약관 페이지입니다.</p>
      <ul>
        <li><a href="/terms/service">서비스 이용약관</a></li>
        <li><a href="/terms/privacy">개인정보 처리방침</a></li>
      </ul>
    </main>
  </body>
</html>
